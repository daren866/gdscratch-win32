name: Build Win32 EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MinGW-w64 (i686) via MSYS2
      run: |
        C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm mingw-w64-i686-gcc mingw-w64-i686-make"
        echo "C:\msys64\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh

    - name: Verify Compiler
      run: g++ --version

    - name: Build project directly with g++
      run: |
        # 用引号包裹 -Wl,-subsystem,windows 参数
        g++ -m32 -O2 -static -static-libgcc -static-libstdc++ "-Wl,-subsystem,windows" -lcomctl32 -I./include -o main.exe ./main.cpp ./src/*.cpp
      shell: pwsh

    - name: Check output
      run: |
        if (Test-Path "main.exe") {
          Write-Host "Build successful! main.exe found."
        } else {
          Write-Error "Build failed! main.exe not found."
          exit 1
        }
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GDScratch-Win32-Build
        path: main.exe
