name: Build Static EXE

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: mingw-w64-x86_64-gcc
        
    - name: Compile with UTF-8 support
      shell: msys2 {0}
      run: |
        # 添加 UTF-8 编译选项
        g++ -static -static-libgcc -static-libstdc++ -O2 \
            -fexec-charset=GBK \
            -finput-charset=UTF-8 \
            -o GDScratchRenderer.exe main.cpp \
            -lgdi32 -lcomctl32
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: GDScratchRenderer
        path: GDScratchRenderer.exe
