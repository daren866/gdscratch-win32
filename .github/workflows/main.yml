name: Simple Static Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Static EXE
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
        cl /nologo /O2 /MT /GS- /Fe:GDScratchRenderer.exe main.cpp /link user32.lib comctl32.lib kernel32.lib gdi32.lib /INCREMENTAL:NO /SUBSYSTEM:WINDOWS
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Static-EXE
        path: GDScratchRenderer.exe
