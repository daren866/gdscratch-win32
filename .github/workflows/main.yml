name: Build Win32 EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MinGW-w64 (i686) via MSYS2
      run: |
        C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm mingw-w64-i686-gcc mingw-w64-i686-make"
        echo "C:\msys64\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh

    - name: Verify Compiler
      run: |
        g++ --version

    - name: Debug - List all files
      run: |
        # 列出仓库所有文件，方便在 Actions 日志中确认代码和 Makefile 的位置
        Write-Host "=== Current Directory Structure ==="
        Get-ChildItem -Recurse -Name
      shell: pwsh

    - name: Build project directly with g++
      run: |
        # ==========================================
        # 重要说明：
        # 1. -m32 : 强制编译为 32 位 Windows 程序
        # 2. -I./include : 包含头文件目录
        # 3. ./src/*.cpp : 编译 src 目录下的所有源码
        # 4. -o main.exe : 输出的文件名
        # 如果你的源文件直接在根目录，请将 ./src/*.cpp 改为 ./*.cpp
        # ==========================================
        g++ -m32 -O2 -I./include -o main.exe ./src/*.cpp
      shell: pwsh

    - name: Check output
      run: |
        if (Test-Path "main.exe") {
          Write-Host "Build successful! main.exe found."
        } else {
          Write-Error "Build failed! main.exe not found."
          exit 1
        }
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GDScratch-Win32-Build
        path: main.exe
