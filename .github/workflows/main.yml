name: Build Static EXE

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install MinGW
      shell: cmd
      run: |
        choco install mingw -y
        set PATH=C:\ProgramData\chocolatey\lib\mingw\tools\x86_64-13.2.0-win32-seh-msvcrt-rt_v11-rev1\mingw64\bin;%PATH%
        g++ --version
        
    - name: Compile
      shell: cmd
      run: |
        set PATH=C:\ProgramData\chocolatey\lib\mingw\tools\x86_64-13.2.0-win32-seh-msvcrt-rt_v11-rev1\mingw64\bin;%PATH%
        g++ -static -static-libgcc -static-libstdc++ -O2 -o GDScratchRenderer.exe main.cpp -lgdi32 -lcomctl32 -Wl,--subsystem,windows
        
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: GDScratchRenderer
        path: GDScratchRenderer.exe
