name: Build Win32 EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MinGW-w64 (i686) via MSYS2
      # 使用 PowerShell 调用 MSYS2 来安装 32 位的 GCC 和 Make
      run: |
        C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm mingw-w64-i686-gcc mingw-w64-i686-make"
        
        # 将 32 位 MinGW 的 bin 目录添加到 GitHub Actions 的系统环境变量中
        # 这样后续的步骤就能直接找到 g++.exe 和 make.exe
        echo "C:\msys64\mingw32\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh

    - name: Verify Compiler
      run: |
        g++ --version
        # 注意：MSYS2 安装的 make 名字为 mingw32-make，我们做个映射
        mingw32-make --version
      shell: pwsh

    - name: Build project
      run: mingw32-make
      # 注意：MSYS2 环境下的 make 命令叫 mingw32-make。
      # 如果你的 Makefile 内部有递归调用 $(MAKE)，建议在环境变量中映射一下
      env:
        MAKE: mingw32-make

    - name: Check output
      run: |
        # 这里的 "main.exe" 请替换为你 Makefile 中实际生成的文件名
        if (Test-Path "main.exe") {
          Write-Host "Build successful! main.exe found."
        } else {
          Write-Error "Build failed! main.exe not found."
          exit 1
        }
      shell: pwsh

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GDScratch-Win32-Build
        path: main.exe
